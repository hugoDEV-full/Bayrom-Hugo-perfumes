version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bayrom-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: bayrom_hugo_perfumes
      MYSQL_USER: bayrom_user
      MYSQL_PASSWORD: bayrom_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
